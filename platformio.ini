; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = atmelavr
framework = arduino
lib_extra_dirs = ./include/
lib_deps =
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	duinowitchery/hd44780@^1.3.2

; Original working target -- Uno-flavored ATmega328P w/ optiboot @ 115200 baud
[env:uno]
board = uno

; Nano with old-style stk500v1 bootloader @ 57600 baud
[env:nano_old]
board = nanoatmega328

; Nano with optiboot bootloader @ 115200 baud (newer clones)
[env:nano_new]
board = nanoatmega328new

; Legacy env name kept as alias for existing scripts/CI
[env:nanoatmega328]
board = uno
